name: Build Electron GUI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - "gui-electron/**"
      - "alpha_layers.json"
      - ".github/workflows/gui-electron-release.yml"

jobs:
  build-macos:
    name: Build macOS (signed + notarized)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui-electron/package-lock.json

      - name: Install deps
        working-directory: gui-electron
        run: npm ci

      - name: Build signed/notarized macOS artifacts
        working-directory: gui-electron
        env:
          # Signing certificate (.p12) base64 in GitHub secret APPLE_CERT_P12_BASE64.
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          # Apple notarization credentials.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KeymapSync-macos
          path: gui-electron/dist/*

  build-windows:
    name: Build Windows (unsigned)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui-electron/package-lock.json

      - name: Install deps
        working-directory: gui-electron
        run: npm ci

      - name: Build unsigned Windows artifacts
        working-directory: gui-electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KeymapSync-windows
          path: gui-electron/dist/*

  release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: KeymapSync-macos
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: KeymapSync-windows
          path: release-assets/windows

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/macos/**
            release-assets/windows/**
