name: Build Electron GUI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - "gui-electron/**"
      - "alpha_layers.json"
      - ".github/workflows/gui-electron-release.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-macos:
    name: Build macOS (signed + notarized)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui-electron/package-lock.json

      - name: Install deps
        working-directory: gui-electron
        run: npm ci

      - name: Build signed/notarized macOS artifacts
        working-directory: gui-electron
        env:
          # Signing certificate (.p12) base64 in GitHub secret APPLE_CERT_P12_BASE64.
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          # Apple notarization credentials.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_VERSION="${GITHUB_REF_NAME#v}"
          else
            BUILD_VERSION="$(node -p "require('./package.json').version")"
          fi
          node scripts/fetch-vitaly.js
          npx electron-builder --mac --publish never --config.extraMetadata.version="${BUILD_VERSION}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: KeymapSync-macos
          path: |
            gui-electron/dist/*.dmg
            gui-electron/dist/*.zip
            gui-electron/dist/*.blockmap
            gui-electron/dist/latest-mac.yml

  build-windows:
    name: Build Windows (unsigned)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui-electron/package-lock.json

      - name: Install deps
        working-directory: gui-electron
        run: npm ci

      - name: Build unsigned Windows artifacts
        working-directory: gui-electron
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_VERSION="${GITHUB_REF_NAME#v}"
          else
            BUILD_VERSION="$(node -p "require('./package.json').version")"
          fi
          node scripts/fetch-vitaly.js --win
          npx electron-builder --win --x64 --publish never --config.extraMetadata.version="${BUILD_VERSION}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: KeymapSync-windows
          path: |
            gui-electron/dist/*.exe
            gui-electron/dist/*.zip
            gui-electron/dist/*.blockmap
            gui-electron/dist/latest*.yml

  release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: KeymapSync-macos
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: KeymapSync-windows
          path: release-assets/windows

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/macos/*.dmg
            release-assets/macos/*.zip
            release-assets/macos/*.blockmap
            release-assets/macos/latest-mac.yml
            release-assets/windows/*.exe
            release-assets/windows/*.zip
            release-assets/windows/*.blockmap
            release-assets/windows/latest*.yml
