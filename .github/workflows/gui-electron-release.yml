name: Build Electron GUI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-macos:
    name: Build macOS (signed + notarized)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui-electron/package-lock.json

      - name: Install deps
        working-directory: gui-electron
        run: npm ci

      - name: Build signed/notarized macOS artifacts
        working-directory: gui-electron
        env:
          # Signing certificate (.p12) base64 in GitHub secret APPLE_CERT_P12_BASE64.
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          # Apple notarization credentials.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_VERSION="${GITHUB_REF_NAME#v}"
          else
            BUILD_VERSION="$(node -p "require('./package.json').version")"
          fi
          node scripts/fetch-vitaly.js
          npx electron-builder --mac --publish never --config.extraMetadata.version="${BUILD_VERSION}"

      - name: Smoke check macOS bundle contents
        working-directory: gui-electron
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="$(ls -d dist/mac*/KeymapSync.app | head -n1)"
          test -f "${APP_DIR}/Contents/Resources/bin/vitaly"
          test -f "${APP_DIR}/Contents/Resources/app.asar"
          ASAR_PATH="${APP_DIR}/Contents/Resources/app.asar" node - <<'NODE'
          const { execFileSync } = require('child_process');
          const asarPath = process.env.ASAR_PATH;
          const out = execFileSync('npx', ['asar', 'list', asarPath], { encoding: 'utf8' });
          const mustContain = ['kle-parser.js', 'keycode-mapping.js', 'kle-rect-union.js', 'renderer.js'];
          const missing = mustContain.filter((f) => !out.includes(f));
          if (missing.length) {
            throw new Error(`Missing files in macOS app.asar: ${missing.join(', ')}`);
          }
          NODE

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: KeymapSync-macos
          path: |
            gui-electron/dist/*.dmg
            gui-electron/dist/*.zip
            gui-electron/dist/*.blockmap
            gui-electron/dist/latest-mac.yml

  build-windows:
    name: Build Windows (unsigned)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui-electron/package-lock.json

      - name: Install deps
        working-directory: gui-electron
        run: npm ci

      - name: Build unsigned Windows artifacts
        working-directory: gui-electron
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_VERSION="${GITHUB_REF_NAME#v}"
          else
            BUILD_VERSION="$(node -p "require('./package.json').version")"
          fi
          node scripts/fetch-vitaly.js --win
          npx electron-builder --win --x64 --publish never --config.extraMetadata.version="${BUILD_VERSION}"

      - name: Smoke check Windows bundle contents
        working-directory: gui-electron
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="dist/win-unpacked"
          RES_DIR="${APP_DIR}/resources"
          test -d "${RES_DIR}"
          test -f "${RES_DIR}/app.asar"
          RES_DIR="${RES_DIR}" ASAR_PATH="${RES_DIR}/app.asar" node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { execFileSync } = require('child_process');
          const resourcesDir = process.env.RES_DIR;
          const asarPath = process.env.ASAR_PATH;

          function walk(dir, out = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full, out);
              else out.push(full);
            }
            return out;
          }

          const files = walk(resourcesDir);
          const vitalyPath = files.find((p) => /(^|[\\/])vitaly(\.exe)?$/i.test(p));
          if (!vitalyPath) {
            throw new Error(
              `Could not find vitaly in ${resourcesDir}. Files discovered: ${files.join(', ')}`
            );
          }
          console.log(`Found bundled vitaly at: ${vitalyPath}`);

          const asarCli = require.resolve('@electron/asar/bin/asar.js', {
            paths: [process.cwd()]
          });
          const out = execFileSync(process.execPath, [asarCli, 'list', asarPath], { encoding: 'utf8' });
          const mustContain = ['kle-parser.js', 'keycode-mapping.js', 'kle-rect-union.js', 'renderer.js'];
          const missing = mustContain.filter((f) => !out.includes(f));
          if (missing.length) {
            throw new Error(`Missing files in Windows app.asar: ${missing.join(', ')}`);
          }
          NODE

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: KeymapSync-windows
          path: |
            gui-electron/dist/*.exe
            gui-electron/dist/*.zip
            gui-electron/dist/*.blockmap
            gui-electron/dist/latest*.yml

  release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: KeymapSync-macos
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: KeymapSync-windows
          path: release-assets/windows

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/macos/*.dmg
            release-assets/macos/*.zip
            release-assets/macos/*.blockmap
            release-assets/macos/latest-mac.yml
            release-assets/windows/*.exe
            release-assets/windows/*.zip
            release-assets/windows/*.blockmap
            release-assets/windows/latest*.yml
